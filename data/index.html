<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Монитор микроклимата</title><link rel="stylesheet" href="style.css"><!-- Chart.js from CDN --><script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.0/dist/chart.umd.min.js"></script></head><body><header><h1>Монитор микроклимата</h1><div class="controls"><button id="btn-refresh">Обновить</button> <button id="btn-reset-wifi">Сброс Wi-Fi</button> <span id="status">Статус: …</span></div></header><main><section class="panels"><div class="panel"><div class="label">Температура</div><div id="val-temp" class="value">— °C</div></div><div class="panel"><div class="label">Влажность</div><div id="val-hum" class="value">— %</div></div><div class="panel"><div class="label">Освещённость</div><div id="val-light" class="value">— lx</div></div><div class="panel"><div class="label">eCO₂</div><div id="val-co2" class="value">— ppm</div></div><div class="panel"><div class="label">TVOC</div><div id="val-tvoc" class="value">— ppb</div></div></section><section class="charts"><div class="chart-card"><canvas id="chart-temp"></canvas></div><div class="chart-card"><canvas id="chart-hum"></canvas></div><div class="chart-card"><canvas id="chart-light"></canvas></div><div class="chart-card"><canvas id="chart-co2"></canvas></div></section><footer><small>Доступ: <a href="http://climate.local">http://climate.local</a> (если mDNS работает)</small></footer></main><script src="script.js"></script></body></html>
